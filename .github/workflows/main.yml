name: Build JE APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Locate JE project
        run: |
          echo "Repo files:"
          ls -la

          if [ -f "settings.gradle.kts" ] && [ -d "app" ]; then
            echo "PROJECT_DIR=$PWD" >> $GITHUB_ENV
            exit 0
          fi

          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No Android project or zip found."
            echo "Upload the JE project zip into the repo root."
            exit 1
          fi

          echo "Using zip: $ZIP_FILE"
          unzip "$ZIP_FILE" -d extracted

          PROJECT_DIR=$(find extracted -name "settings.gradle.kts" | head -1 | xargs dirname)

          if [ -z "$PROJECT_DIR" ]; then
            echo "No settings.gradle.kts found inside zip."
            find extracted -maxdepth 4 -type f
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Found project at: $PROJECT_DIR"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653" \
            "cmake;3.22.1"

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: JE-production-release-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
