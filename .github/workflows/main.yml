name: Build JE APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract JE project
        run: |
          unzip JE_GITHUB_ACTIONS_AUTO_BUILD.zip -d extracted
          PROJECT_DIR=$(find extracted -name settings.gradle.kts | head -1 | xargs dirname)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Using project: $PROJECT_DIR"
          ls "$PROJECT_DIR"
          ls "$PROJECT_DIR/app"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653" \
            "cmake;3.22.1"

      - name: Build Release APK
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: JE-production-release-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
